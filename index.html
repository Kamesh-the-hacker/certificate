<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexus RAG Certificate Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
    font-family:'Montserrat',sans-serif;
    text-align:center;
    background:#f0f0f0;
    margin-top:100px;
}

input{
    padding:10px;
    font-size:16px;
    width:250px;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

/* HIDE certificate */
#certificate{
    position:absolute;
    left:-9999px;
    top:-9999px;
    width:1123px;
    height:794px;
}

#certificate img{
    width:1123px;
    height:794px;
}

.name{
    position:absolute;
    top:360px;
    width:100%;
    text-align:center;
    font-size:42px;
    font-weight:700;
}

.certid{
    position:absolute;
    left:100px;
    top:560px;

    font-size:20px;
    font-weight:600;

    transform: rotate(-90deg);
    transform-origin:left top;

    letter-spacing:2px;
}

</style>
</head>
<body>

<h2>RAG Workshop Certificate Generator 🎓</h2>

<input type="text" id="nameInput" placeholder="Enter your name">
<br><br>

<button onclick="generateCertificate()">Download Certificate</button>


<!-- Hidden certificate -->
<div id="certificate">

    <img src="certificate.png">

    <div class="name" id="certName"></div>

    <div class="certid" id="certID"></div>

</div>


<script>

function createCertificateID(){

    let year = new Date().getFullYear();

    let random = Math.floor(1000 + Math.random()*9000);

    return "NEXUS-RAG-" + year + "-" + random;
}


async function generateCertificate(){

    let name = document.getElementById("nameInput").value.trim();

    if(name==""){
        alert("Enter name");
        return;
    }

    let certID = createCertificateID();

    document.getElementById("certName").innerText = name;
    


    const canvas = await html2canvas(document.getElementById("certificate"),{
        scale:2
    });

    const imgData = canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF({
        orientation:"landscape",
        unit:"px",
        format:[1123,794]
    });

    pdf.addImage(imgData,"PNG",0,0,1123,794);

    pdf.save(name+"_certificate.pdf");

}

</script>

</body>
</html>
